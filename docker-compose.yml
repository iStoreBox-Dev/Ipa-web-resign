version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme-32-chars-encryption-key}
      - UPLOAD_DIR=/uploads
      - CORS_ORIGIN=http://localhost:80
    volumes:
      - backend-data:/data
      - backend-uploads:/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
